<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diagnóstico</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f1f5f9;
    font-family: 'Segoe UI', sans-serif;
}

/* CARD */
.card-custom {
    border-radius: 15px;
    overflow: hidden;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #1e293b, #334155);
    color: white;
    padding: 20px;
    font-size: 18px;
    font-weight: bold;
}

/* INPUTS */
.form-control {
    border-radius: 10px;
    padding: 10px;
}

/* LABELS */
label {
    font-weight: 600;
    margin-bottom: 5px;
}

/* BLOQUES */
.field-box {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0px 2px 6px rgba(0,0,0,0.05);
}

/* BOTÓN */
.btn-custom {
    background: #16a34a;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
}

.btn-custom:hover {
    background: #15803d;
}
.field-box textarea {
    min-height: 100px;
    resize: vertical;
}
</style>

</head>

<body>

<div class="container py-4">
    <div class="card shadow card-custom">

        <!-- HEADER -->
        <div class="header">
            Diagnóstico de Generador Eléctrico
        </div>

        <div class="card-body">

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row">

                    {% for field in form %}
                        <div class="col-12 col-md-6">

                            <div class="field-box">
                                <label>{{ field.label }}</label>
                                {{ field }}

                                {% if field.errors %}
                                    <div class="text-danger small">
                                        {{ field.errors }}
                                    </div>
                                {% endif %}
                            </div>

                        </div>
                    {% endfor %}

                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-custom w-100">
                        Enviar Diagnóstico
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
